<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Su Consultor Financiero</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current url and converts it into a query string,
      // then redirects the browser to the new url with only a query string and hash fragment,
      // e.g. http://www.foo.tld/one/two?a=b#c --> http://www.foo.tld/?p=/one/two&q=a=b#c
      // Note: any fractional parts of the path that are not to be interpreted as
      // document locations (e.g. file extensions) should be excluded from the redirect.
      var pathSegmentsToKeep = 0;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );

    </script>
  </head>
  <body>
  </body>
</html>
